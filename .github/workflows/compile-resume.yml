name: Compile Resume

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g., 9.6)"
        required: true
        default: "9.6"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up TeX Live
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          latexmk_use_xelatex: false

      - name: Install Pandoc and Python tools
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc python3-pip
          pip install google-genai

      - name: Get version number
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            # Check if versions directory exists and has files
            if [ -d "versions" ] && [ "$(ls -A versions)" ]; then
              # Get the latest version from the versions directory
              LATEST_VERSION=$(ls -1 versions/puneet_ludu_v*.pdf | sort -V | tail -n 1 | grep -oP 'v\K[0-9]+\.[0-9]+')
              
              # Extract major and minor version
              MAJOR=$(echo $LATEST_VERSION | cut -d. -f1)
              MINOR=$(echo $LATEST_VERSION | cut -d. -f2)
              
              # Increment minor version by 2
              NEW_MINOR=$((MINOR + 1))
              
              # If minor version exceeds 9, increment major and reset minor to 0
              if [ $NEW_MINOR -gt 9 ]; then
                NEW_MAJOR=$((MAJOR + 1))
                NEW_MINOR=0
              else
                NEW_MAJOR=$MAJOR
              fi
              
              echo "VERSION=$NEW_MAJOR.$NEW_MINOR" >> $GITHUB_ENV
            else
              # Default to 9.6 if versions directory is empty
              echo "VERSION=9.6" >> $GITHUB_ENV
            fi
          fi

          echo "Using version: ${{ env.VERSION }}"

      - name: Create versions directory
        run: |
          mkdir -p versions

      - name: Save versioned PDF
        run: |
          cp resume.pdf "versions/puneet_ludu_v${{ env.VERSION }}.pdf"
          # Also copy to root as latest version
          cp resume.pdf "puneet_ludu_resume_latest.pdf"

      - name: Convert LaTeX to Markdown and clean up
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VERSION: ${{ env.VERSION }}
        run: |
          # Pre-process resume.tex so Pandoc sees only commands it handles
          # reliably across versions. The original file is untouched.
          #   - \sectionbox{X}    -> \section*{X}       (proper Markdown headers)
          #   - \yearsright{X}    -> \textbf{X}         (year badge — \yearsright
          #     is a custom macro that some Pandoc versions drop silently)
          sed -e 's/\\sectionbox{\([^}]*\)}/\\section*{\1}/g' \
              -e 's/\\yearsright{\([^}]*\)}/\\textbf{\1}/g' \
              resume.tex > resume_for_pandoc.tex

          # --wrap=none keeps sentences on one line; -t gfm emits GitHub-
          # flavored Markdown (pipe tables instead of Pandoc simple tables);
          # --shift-heading-level-by=1 demotes \section* to ## so the README's
          # top-level "# Puneet Ludu — Resume" stays the only h1.
          pandoc -s resume_for_pandoc.tex --wrap=none -t gfm --shift-heading-level-by=1 -o resume_raw.md
          rm resume_for_pandoc.tex

          # Artifact cleanup, PII obfuscation, optional Gemini polish; writes
          # both resume.md and README.md.
          python clean_markdown.py

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: |
            puneet_ludu_resume_latest.pdf
            versions/puneet_ludu_v${{ env.VERSION }}.pdf
          retention-days: 30

      - name: Upload README artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-readme
          path: README.md
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            puneet_ludu_resume_latest.pdf
            versions/puneet_ludu_v${{ env.VERSION }}.pdf
            README.md
          tag_name: v${{ env.VERSION }}
          name: Resume v${{ env.VERSION }}
          body: |
            Resume version ${{ env.VERSION }}

            Automatically compiled from the LaTeX source.
          draft: false
          prerelease: false

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md RUNSTEPS.md puneet_ludu_resume_latest.pdf versions/
          git commit -m "Update README and PDF for version ${{ env.VERSION }}" || echo "No changes to commit"
          git push
